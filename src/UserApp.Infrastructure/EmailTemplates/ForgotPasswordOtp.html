<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background-color:#f4f7fb;font-family:'Segoe UI',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7fb;padding:40px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                    <tr>
                        <td style="padding:40px 32px 0 32px;text-align:center;">
                            <div style="width:48px;height:48px;background:#1e293b;border-radius:12px;margin:0 auto 20px auto;display:flex;align-items:center;justify-content:center;">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.519 1.116-3.113 1.382-4.79" />
                                </svg>
                            </div>
                            <h1 style="margin:0 0 6px 0;font-size:24px;font-weight:700;color:#1e293b;letter-spacing:-0.3px;">Password Reset</h1>
                            <p style="margin:0;font-size:14px;color:#64748b;line-height:1.5;">Use the OTP below to reset your password. It expires in 5 minutes.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px 32px;text-align:center;">
                            <div style="background:#f1f5f9;border-radius:12px;padding:28px 16px;">
                                <span style="font-size:36px;font-weight:700;letter-spacing:10px;color:#1e293b;font-family:monospace;">{{OTP}}</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 32px 32px 32px;text-align:center;">
                            <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.5;">If you didn't request this password reset, please ignore this email. Your account is secure.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;text-align:center;">
                            <p style="margin:0;font-size:12px;color:#94a3b8;">&copy; {{YEAR}} UserApp. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
